<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}StudIt{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css?v=18" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">StudIt</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="{% url 'rooms:list' %}"
            >스터디룸</a
          >
          {% if user.is_authenticated %}
          <a class="nav-link text-white" href="{% url 'timetable:list' %}"
            >시간표</a
          >
          <a class="nav-link text-white" href="{% url 'timetable:recommend' %}"
            >AI 추천</a
          >
          <a class="nav-link text-white" href="{% url 'reservations:my_list' %}"
            >내 예약</a
          >
          <a class="nav-link text-white" href="{% url 'accounts:logout' %}"
            >로그아웃</a
          >
          {% else %}
          <a class="nav-link text-white" href="{% url 'accounts:login' %}"
            >로그인</a
          >
          <a class="nav-link text-white" href="{% url 'accounts:signup' %}"
            >회원가입</a
          >
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      {% if messages %} {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
      {% endfor %} {% endif %} {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/time_picker.js?v=3"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
