{% extends "base.html" %}
{% block title %}시간표 추가{% endblock %}
{% block content %}
<h2>수업 시간표 추가</h2>
<form method="post" class="col-md-6">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">요일</label>
    <select class="form-select" name="day_of_week" required>
      <option value="0">월</option>
      <option value="1">화</option>
      <option value="2">수</option>
      <option value="3">목</option>
      <option value="4">금</option>
      <option value="5">토</option>
      <option value="6">일</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">과목명</label>
    <input class="form-control" type="text" name="subject_name" required>
  </div>
  <div class="mb-3">
    <label class="form-label">시작 시간</label>
    <input class="form-control" type="time" name="start_time" required>
  </div>
  <div class="mb-3">
    <label class="form-label">종료 시간</label>
    <input class="form-control" type="time" name="end_time" required>
  </div>
  <div class="mb-3">
    <label class="form-label">강의실</label>
    <input class="form-control" type="text" name="location">
  </div>
  <button class="btn btn-primary" type="submit">저장</button>
</form>
{% endblock %}
